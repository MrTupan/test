<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Pro</title>

  <!-- ============================================================================ -->
  <!-- SECTION 1: PWA & MOBILE OPTIMIZATION -->
  <!-- ============================================================================ -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">

  <!-- ============================================================================ -->
  <!-- SECTION 2: EXTERNAL CLOUD LIBRARIES -->
  <!-- ============================================================================ -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ============================================================================ -->
  <!-- SECTION 3: BOOT INTERFACE DESIGN -->
  <!-- ============================================================================ -->
  <style>
    /**
     * Minimal CSS to render the loading screen.
     * The rest of the app's style.css is stored inside the encrypted vault.
     */
    body { background: #0f172a; margin: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .vault-loader { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 30px; }
    .spinner { width: 45px; height: 45px; border: 4px solid #1e293b; border-top-color: #f97316; border-radius: 50%; animation: vault-spin 0.8s linear infinite; box-shadow: 0 0 15px rgba(249,115,22,0.1); }
    #status-text { color: #f97316; font-weight: 900; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; animation: pulse 2s infinite; }
    @keyframes vault-spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>

  <!-- MASTER MOUNT ELEMENT -->
  <div id="root">
     <div class="vault-loader">
        <div class="spinner"></div>
        <div id="status-text">DECRYPTING VAULT...</div>
     </div>
  </div>

  <!-- ============================================================================ -->
  <!-- SECTION 4: ATOMIC DECRYPTION ENGINE v10.0 -->
  <!-- ============================================================================ -->
  <script>
    /**
     * bootWorkshopSystem
     * logic: 
     * 1. Fetches the Base64-encoded core.data.
     * 2. Decodes the transport layer back into a binary buffer.
     * 3. Iterates through the byte stream and performs XOR restoration.
     * 4. Uses TextDecoder to recover multi-byte Emojis (Stickers).
     * 5. Injects the entire application state into the RAM execution environment.
     */
    async function bootWorkshopSystem() {
        const label = document.getElementById('status-text');
        
        // The Private 16-byte Master Key (Must match pack.py)
        const K = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];
        
        // High-fidelity UTF-8 Decoder for Sticker preservation
        const decoder = new TextDecoder("utf-8");

        try {
            label.innerText = "ACCESSING SECURE DATA...";
            
            // 1. Fetch the Base64 file as text
            const response = await fetch('core.data');
            if (!response.ok) throw new Error("VAULT_OFFLINE");
            
            const base64String = await response.text();

            // 2. Decode Base64 string back to a Binary Array
            // logic: atob handles the transport decoding, then we map to bytes
            const rawBinaryString = atob(base64String);
            const binaryData = new Uint8Array(rawBinaryString.length);
            for (let i = 0; i < rawBinaryString.length; i++) {
                binaryData[i] = rawBinaryString.charCodeAt(i);
            }

            // Prepare memory buffers for reassembly
            const dataView = new DataView(binaryData.buffer);
            let ptr = 0;
            let javascriptSource = "";
            let cssSource = "";

            // 3. The Reassembly Loop
            while (ptr < binaryData.byteLength) {
                
                // A. Parse Filename Header
                const nLen = dataView.getUint8(ptr++);
                const nBytes = binaryData.subarray(ptr, ptr + nLen);
                const fileName = decoder.decode(nBytes);
                ptr += nLen;

                // B. Parse Data Length Header
                const dLen = dataView.getUint32(ptr);
                ptr += 4;

                // C. XOR DECRYPTION ENGINE (FIXED)
                const encryptedSegment = binaryData.subarray(ptr, ptr + dLen);
                const decryptedBytes = new Uint8Array(dLen);

                for (let j = 0; j < dLen; j++) {
                    /**
                     * logic: REVERSE BIT-SHIFT
                     * Uses the 16-byte rolling key to recover the original byte.
                     */
                    decryptedBytes[j] = encryptedSegment[j] ^ K[j % K.length];
                }

                /**
                 * STICKER RECONSTRUCTION
                 * logic: TextDecoder ensures that multi-byte Emoji codes (like 0xF0 0x9F 0x92 0xB5)
                 * are re-stitched into a single character before injection.
                 */
                const decryptedText = decoder.decode(decryptedBytes);
                ptr += dLen;

                // D. Memory Sorting
                if (fileName.endsWith('.css')) {
                    cssSource += decryptedText;
                } else {
                    javascriptSource += "\n" + decryptedText;
                }
                
                console.log("Vault Integrity Verified: " + fileName);
            }

            label.innerText = "STARTING ENGINE...";

            // 4. Inject Styles into the DOM
            const styleTag = document.createElement('style');
            styleTag.textContent = cssSource;
            document.head.appendChild(styleTag);

            // 5. Inject Application Logic via Babel Transpilation
            // Note: This compiles the code directly from RAM, leaving no trace in the browser cache.
            const compiledCode = Babel.transform(javascriptSource, { presets: ['react'] }).code;
            const scriptTag = document.createElement('script');
            scriptTag.text = compiledCode;
            document.body.appendChild(scriptTag);
            
            console.log("System Online. State: Encrypted Standalone.");

        } catch (err) {
            label.innerText = "VAULT ERROR: AUTHENTICATION FAILED";
            label.style.color = "#ef4444";
            console.error("Critical System Failure:", err);
        }
    }

    /**
     * SERVICE WORKER (PWA)
     * logic: Handles the offline caching of the encrypted vault.
     */
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                console.log('Secure Cache: Active');
            });
        });
    }
    
    // Trigger boot sequence
    setTimeout(bootWorkshopSystem, 800);
  </script>
</body>
</html>
