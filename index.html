<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Pro</title>

  <!-- PWA SETTINGS -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">

  <!-- CORE LIBRARIES (External) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- INTERNAL CSS (For Loader only, main CSS is in the vault) -->
  <style>
    body { background: #0f172a; margin: 0; overflow: hidden; }
    .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="root">
     <div style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; color:#f97316; font-family:sans-serif;">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight:bold; font-size:12px; letter-spacing:2px; text-transform:uppercase;">ACCESSING VAULT...</div>
     </div>
  </div>

  <script>
    async function unlockVault() {
        const status = document.getElementById('status-text');
        const KEY = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];

        try {
            const res = await fetch('core.data');
            const buf = await res.arrayBuffer();
            const view = new DataView(buf);
            let offset = 0;
            let jsSource = "";
            let cssSource = "";

            while (offset < buf.byteLength) {
                // Read Filename
                const nameLen = view.getUint8(offset++);
                const name = new TextDecoder().decode(new Uint8Array(buf, offset, nameLen));
                offset += nameLen;

                // Read Content
                const dataLen = view.getUint32(offset);
                offset += 4;
                const encrypted = new Uint8Array(buf, offset, dataLen);
                let decrypted = "";
                for (let i = 0; i < dataLen; i++) {
                    decrypted += String.fromCharCode(encrypted[i] ^ KEY[i % KEY.length] ^ (i % 255));
                }
                offset += dataLen;

                // Sort content (Style vs Logic)
                if (name.endsWith('.css')) {
                    cssSource += decrypted;
                } else {
                    jsSource += "\n" + decrypted;
                }
            }

            // 1. Inject Styles
            const styleTag = document.createElement('style');
            styleTag.textContent = cssSource;
            document.head.appendChild(styleTag);

            // 2. Inject Logic (Babel Transpilation)
            const finalJS = Babel.transform(jsSource, { presets: ['react'] }).code;
            const scriptTag = document.createElement('script');
            scriptTag.text = finalJS;
            document.body.appendChild(scriptTag);

        } catch (e) {
            status.innerText = "VAULT ERROR: UNAUTHORIZED";
            status.style.color = "#ef4444";
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
    
    setTimeout(unlockVault, 1000);
  </script>
</body>
</html>
