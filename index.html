<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; margin: 0; overflow: hidden; }
    .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
     <div style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; color:#f97316; font-family:sans-serif;">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight:bold; font-size:11px; letter-spacing:2px; text-transform:uppercase;">UNLOCKING VAULT...</div>
     </div>
  </div>
  <script>
    async function bootSystem() {
        const status = document.getElementById('status-text');
        const KEY = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];
        const decoder = new TextDecoder("utf-8");

        try {
            const res = await fetch('core.data');
            const buf = await res.arrayBuffer();
            const view = new DataView(buf);
            let offset = 0, jsStr = "", cssStr = "";

            while (offset < buf.byteLength) {
                const nLen = view.getUint8(offset++);
                const nBytes = new Uint8Array(buf, offset, nLen);
                const name = decoder.decode(nBytes);
                offset += nLen;
                
                const dLen = view.getUint32(offset);
                offset += 4;
                
                const encrypted = new Uint8Array(buf, offset, dLen);
                const decrypted = new Uint8Array(dLen);

                for (let i = 0; i < dLen; i++) {
                    // Mirroring the v9.0 Python math perfectly
                    decrypted[i] = (encrypted[i] ^ KEY[i % KEY.length]) & 0xFF;
                }
                
                const content = decoder.decode(decrypted);
                offset += dLen;

                if (name.endsWith('.css')) cssStr += content; else jsStr += "\n" + content;
            }

            const style = document.createElement('style');
            style.textContent = cssStr;
            document.head.appendChild(style);

            const output = Babel.transform(jsStr, { presets: ['react'] }).code;
            const script = document.createElement('script');
            script.text = output;
            document.body.appendChild(script);

        } catch (e) {
            status.innerText = "VAULT ERROR: AUTHENTICATION FAILED";
            status.style.color = "red";
        }
    }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    setTimeout(bootSystem, 1000);
  </script>
</body>
</html>
