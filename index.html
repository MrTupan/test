<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Pro</title>

  <!-- ============================================================================ -->
  <!-- SECTION 1: MOBILE APP SETTINGS -->
  <!-- ============================================================================ -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">

  <!-- ============================================================================ -->
  <!-- SECTION 2: CLOUD & UI LIBRARIES -->
  <!-- ============================================================================ -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ============================================================================ -->
  <!-- SECTION 3: BOOT LOADER UI -->
  <!-- ============================================================================ -->
  <style>
    body { background: #0f172a; margin: 0; overflow: hidden; font-family: sans-serif; }
    .mount-container { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #1e293b; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
    #status-text { color: #f97316; font-weight: bold; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="root">
     <div class="mount-container">
        <div class="spinner"></div>
        <div id="status-text">INITIALIZING SECURE VAULT...</div>
     </div>
  </div>

  <!-- ============================================================================ -->
  <!-- SECTION 4: HEX-DECRYPTION ENGINE v11.0 -->
  <!-- ============================================================================ -->
  <script>
    /**
     * bootWorkshopSystem
     * logic:
     * 1. Fetches the Hex-Encoded core.data file.
     * 2. Converts Hex characters back into a raw Binary Buffer.
     * 3. XOR-Decrypts the buffer in RAM.
     * 4. Uses TextDecoder to recover high-fidelity UTF-8 Emojis (Stickers).
     */
    async function bootWorkshopSystem() {
        const status = document.getElementById('status-text');
        
        // MASTER KEY: Must match pack.py
        const KEY = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];
        const decoder = new TextDecoder("utf-8");

        try {
            status.innerText = "ACCESSING VAULT...";
            
            // 1. Fetch the Hex data as text
            const response = await fetch('core.data');
            const hexString = await response.text();

            // 2. CONVERT HEX TO UINT8ARRAY (The most stable binary conversion)
            const binaryData = new Uint8Array(hexString.length / 2);
            for (let i = 0; i < hexString.length; i += 2) {
                binaryData[i / 2] = parseInt(hexString.substr(i, 2), 16);
            }

            const dataView = new DataView(binaryData.buffer);
            let ptr = 0;
            let combinedJS = "";
            let combinedCSS = "";

            // 3. REASSEMBLY LOOP
            while (ptr < binaryData.byteLength) {
                
                // A. Parse Filename
                const nLen = dataView.getUint8(ptr++);
                const nBytes = binaryData.subarray(ptr, ptr + nLen);
                const name = decoder.decode(nBytes);
                ptr += nLen;

                // B. Parse Data Length
                const dLen = dataView.getUint32(ptr);
                ptr += 4;

                // C. XOR DECRYPTION (STICKER-SAFE)
                const encrypted = binaryData.subarray(ptr, ptr + dLen);
                const decryptedBytes = new Uint8Array(dLen);

                for (let j = 0; j < dLen; j++) {
                    // Reverse the Rolling XOR logic
                    decryptedBytes[j] = encrypted[j] ^ KEY[j % KEY.length];
                }

                /**
                 * STICKER RECONSTRUCTION
                 * logic: TextDecoder correctly stitches together multi-byte Emojis.
                 */
                const textResult = decoder.decode(decryptedBytes);
                ptr += dLen;

                // D. Memory Assignment
                if (name.endsWith('.css')) {
                    combinedCSS += textResult;
                } else {
                    combinedJS += "\n" + textResult;
                }
                console.log("Verified Module: " + name);
            }

            status.innerText = "STARTING ENGINE...";

            // 4. Inject Decrypted Styles
            const styleElement = document.createElement('style');
            styleElement.textContent = combinedCSS;
            document.head.appendChild(styleElement);

            // 5. Inject Decrypted Logic
            const scriptOutput = Babel.transform(combinedJS, { presets: ['react'] }).code;
            const engineScript = document.createElement('script');
            engineScript.text = scriptOutput;
            document.body.appendChild(engineScript);
            
            console.log("System Online. Mode: Hex-Virtualized.");

        } catch (err) {
            status.innerText = "VAULT ERROR: DATA CORRUPTION";
            status.style.color = "#ef4444";
            console.error(err);
        }
    }

    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
    
    // Start boot sequence
    setTimeout(bootWorkshopSystem, 800);
  </script>
</body>
</html>
