<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #0f172a; margin: 0; overflow: hidden; }
    .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
     <div style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; color:#f97316; font-family:sans-serif;">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight:bold; font-size:12px; letter-spacing:2px; text-transform:uppercase;">INITIALIZING SYSTEM...</div>
     </div>
  </div>
  <script>
    /**
     * MASTER BINARY BOOTLOADER v8.2 - UTF-8 FIX
     * logic: Decrypts core.data into a Byte-Buffer using 8-bit masking.
     */
    async function unlockVault() {
        const status = document.getElementById('status-text');
        const KEY = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];

        try {
            status.innerText = "ACCESSING VAULT...";
            const res = await fetch('core.data');
            const buf = await res.arrayBuffer();
            const view = new DataView(buf);
            let offset = 0, jsS = "", cssS = "";

            while (offset < buf.byteLength) {
                const nL = view.getUint8(offset++);
                const name = new TextDecoder().decode(new Uint8Array(buf, offset, nL));
                offset += nL;
                const dL = view.getUint32(offset);
                offset += 4;
                
                const encrypted = new Uint8Array(buf, offset, dL);
                const decryptedBytes = new Uint8Array(dL);

                for (let i = 0; i < dL; i++) {
                    /**
                     * logic: 8-BIT BITWISE XOR
                     * The & 0xFF forces the result to stay a valid byte.
                     */
                    decryptedBytes[i] = (encrypted[i] ^ KEY[i % KEY.length] ^ (i % 255)) & 0xFF;
                }
                
                const text = new TextDecoder("utf-8").decode(decryptedBytes);
                offset += dL;

                if (name.endsWith('.css')) cssS += text; else jsS += "\n" + text;
            }

            status.innerText = "VIRTUALIZING...";
            const style = document.createElement('style');
            style.textContent = cssS;
            document.head.appendChild(style);

            const output = Babel.transform(jsS, { presets: ['react'] }).code;
            const script = document.createElement('script');
            script.text = output;
            document.body.appendChild(script);
        } catch (e) {
            status.innerText = "VAULT ERROR: DATA CORRUPT";
            status.style.color = "#ef4444";
        }
    }
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
    setTimeout(unlockVault, 1000);
  </script>
</body>
</html>
