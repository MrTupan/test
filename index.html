  <!-- MASTER ROOT ELEMENT -->
  <div id="root">

    async function launchSystem() {

        const K = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];

        try {

            const res = await fetch('core.data');
            if (!res.ok) throw new Error("VAULT_NOT_FOUND");
            
            const buf = await res.arrayBuffer();
            const view = new DataView(buf);
            let ptr = 0; // Buffer pointer
            
            let jsPayload = "";
            let cssPayload = "";

            // 2. The Extraction Loop
            while (ptr < buf.byteLength) {
                
                // A. Read Filename
                const nLen = view.getUint8(ptr++);
                const nBytes = new Uint8Array(buf, ptr, nLen);
                const name = utf8.decode(nBytes);
                ptr += nLen;
                
                // B. Read Content Length
                const dLen = view.getUint32(ptr);
                ptr += 4;
                
                // C. DECRYPTION ENGINE (FIXED FOR STICKERS)
                const encrypted = new Uint8Array(buf, ptr, dLen);
                const decrypted = new Uint8Array(dLen);

                for (let i = 0; i < dLen; i++) {

                     */

                ptr += dLen;

                // D. Memory Assignment
                if (name.endsWith('.css')) {
                    cssPayload += contentText;
                } else {
                    jsPayload += "\n" + contentText;
                }
                
                console.log("Vault Integrity Verified: " + name);

            label.innerText = "STARTING ENGINE...";

            styleElement.textContent = cssPayload;
            document.head.appendChild(styleElement);

            const scriptOutput = Babel.transform(jsPayload, { presets: ['react'] }).code;
            const engineScript = document.createElement('script');
            engineScript.text = scriptOutput;
            document.body.appendChild(engineScript);
            
            console.log("System Online. Environment: Standalone PWA.");

        } catch (err) {
            label.innerText = "VAULT ERROR: CORRUPTION DETECTED";

    /**
     * SERVICE WORKER REGISTRATION (PWA)
     * logic: Handles the local caching of 'core.data' for offline use.
     */

        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {

            });

    // Boot the engine after a small buffer to ensure libraries are ready
    setTimeout(launchSystem, 1000);
