<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Workshop Pro</title>

  <!-- PWA SETTINGS -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">

  <!-- CORE LIBRARIES (External) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- INTERNAL CSS (For Loader only) -->
  <style>
    body { background: #0f172a; margin: 0; overflow: hidden; }
    .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: #f97316; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="root">
     <div style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px; color:#f97316; font-family:sans-serif;">
        <div class="spinner"></div>
        <div id="status-text" style="font-weight:bold; font-size:12px; letter-spacing:2px; text-transform:uppercase;">INITIALIZING SYSTEM...</div>
     </div>
  </div>

  <script>
    /**
     * ============================================================================
     * MASTER BINARY BOOTLOADER v8.5 - UTF-8 RECONSTRUCTION EDITION
     * ============================================================================
     * This version fixes the "Broken Stickers" issue by decrypting raw bytes
     * and using TextDecoder to handle multi-byte Emoji characters correctly.
     * ============================================================================
     */
    async function bootVault() {
        const status = document.getElementById('status-text');
        // The Master Key used in pack.py
        const KEY = [0x57, 0x6F, 0x72, 0x6B, 0x73, 0x68, 0x6F, 0x70, 0x32, 0x30, 0x32, 0x36, 0x21, 0x40, 0x23, 0x24];

        try {
            status.innerText = "ACCESSING VAULT...";
            const res = await fetch('core.data');
            const buf = await res.arrayBuffer();
            const view = new DataView(buf);
            
            let offset = 0;
            let jsSource = "";
            let cssSource = "";

            while (offset < buf.byteLength) {
                // 1. Read Filename
                const nameLen = view.getUint8(offset++);
                const nameBytes = new Uint8Array(buf, offset, nameLen);
                const name = new TextDecoder().decode(nameBytes);
                offset += nameLen;

                // 2. Read Content Length
                const dataLen = view.getUint32(offset);
                offset += 4;

                // 3. Decrypt into Byte Array (The fix for Stickers)
                const encrypted = new Uint8Array(buf, offset, dataLen);
                const decryptedBytes = new Uint8Array(dataLen);

                for (let i = 0; i < dataLen; i++) {
                    // Reverse the XOR math for each byte
                    decryptedBytes[i] = encrypted[i] ^ KEY[i % KEY.length] ^ (i % 255);
                }
                
                // Convert the full byte buffer into a UTF-8 string at once
                const decryptedText = new TextDecoder("utf-8").decode(decryptedBytes);
                offset += dataLen;

                // 4. Group by type
                if (name.endsWith('.css')) {
                    cssSource += decryptedText;
                } else {
                    jsSource += "\n" + decryptedText;
                }
            }

            status.innerText = "STARTING ENGINE...";

            // 5. Inject Styles
            const styleElement = document.createElement('style');
            styleElement.textContent = cssSource;
            document.head.appendChild(styleElement);

            // 6. Transpile React and Execute Logic
            const finalExecutable = Babel.transform(jsSource, { presets: ['react'] }).code;
            const scriptElement = document.createElement('script');
            scriptElement.text = finalExecutable;
            document.body.appendChild(scriptElement);

        } catch (error) {
            status.innerText = "SYSTEM ERROR: VAULT FAILED";
            status.style.color = "#ef4444";
            console.error(error);
        }
    }

    // Register PWA for Offline support
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }
    
    // Start boot sequence
    setTimeout(bootVault, 1000);
  </script>
</body>
</html>
